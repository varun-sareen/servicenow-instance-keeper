# ============================================================
# ServiceNow Instance Keeper - Daily GitHub Actions Workflow
# ============================================================
# This runs every day at 13:00 CET (adjust to your timezone)
# and keeps your ServiceNow developer instance alive.
# ============================================================

name: Keep ServiceNow Instance Alive

on:
  # ── Runs daily on a schedule ──────────────────────────────
  schedule:
    - cron: "0 12 * * *" # Every day at 12:00 UTC = 13:00 CET (Berlin winter) / 14:00 CEST (Berlin summer)
    #   Tip: Google "crontab guru" to build your own schedule

  # ── Also allows you to run it manually anytime ────────────
  workflow_dispatch:
    # This adds a "Run workflow" button in the GitHub Actions tab

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Safety: kill if stuck for 20 mins
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── Step 1: Get the code ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Node.js ────────────────────────────
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: 'npm'

      # ── Step 3: Install dependencies ──────────────────────
      - name: 📚 Install npm packages
        run: npm install

      # ── Step 4: Resolve Playwright version for cache key ──
      - name: Get Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -e "console.log(require('playwright/package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Step 5: Cache Playwright browser binaries ─────────
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # ── Step 6: Install Playwright browser ────────────────
      - name: 🌐 Install Playwright Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🌐 Install Playwright OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Step 7: Run the keep-alive script ─────────────────
      - name: 🚀 Run Instance Keeper
        id: keeper
        env:
          SERVICENOW_INSTANCE_URL: ${{ secrets.SERVICENOW_INSTANCE_URL }}
          SERVICENOW_USERNAME: ${{ secrets.SERVICENOW_USERNAME }}
          SERVICENOW_PASSWORD: ${{ secrets.SERVICENOW_PASSWORD }}
          SERVICENOW_DEV_EMAIL: ${{ secrets.SERVICENOW_DEV_EMAIL }}
          SERVICENOW_DEV_PASSWORD: ${{ secrets.SERVICENOW_DEV_PASSWORD }}
        run: npm run keep-alive

      # ── Step 8: Send email notification ───────────────────
      # Runs ALWAYS — whether the script succeeded or failed
      - name: 📧 Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: "ServiceNow Keeper: ${{ steps.keeper.outcome == 'success' && '✅ Instance is alive!' || '❌ Something went wrong' }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ServiceNow Instance Keeper
          body: |
            Hi! Here's your daily ServiceNow Instance Keeper report.

            Status: ${{ steps.keeper.outcome == 'success' && '✅ SUCCESS' || '❌ FAILED' }}
            Instance: ${{ secrets.SERVICENOW_INSTANCE_URL }}
            Time: ${{ github.event.repository.updated_at }}
            
            ${{ steps.keeper.outcome == 'success' && 'Your instance has been accessed and is safe from reclaim.' || 'Something went wrong. Please check the logs at:' }}
            
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
