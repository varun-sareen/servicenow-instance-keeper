# ============================================================
# Traffic Data Collector
# ============================================================
# Saves daily GitHub traffic stats (visitors + clones) to a
# JSON file in the repo so you don't lose the 14-day data.
# ============================================================

name: Collect Traffic Data

on:
  schedule:
    - cron: "0 23 * * *" # Every day at 23:00 UTC (before GitHub resets)

  workflow_dispatch: # Manual trigger

jobs:
  collect-traffic:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write # Needed to commit the traffic data file

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📊 Collect and save traffic data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TRAFFIC_TOKEN }}
          script: |
            const fs = require('fs');

            // Fetch traffic data from GitHub API
            const views = await github.rest.repos.getViews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per: 'day'
            });

            const clones = await github.rest.repos.getClones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per: 'day'
            });

            // Load existing data or start fresh
            const dataFile = 'traffic-data.json';
            let allData = { views: [], clones: [], lastUpdated: '' };

            try {
              if (fs.existsSync(dataFile)) {
                allData = JSON.parse(fs.readFileSync(dataFile, 'utf8'));
              }
            } catch (e) {
              console.log('Starting fresh data file');
            }

            // Merge new data (avoid duplicates by timestamp)
            const existingViewDates = new Set(allData.views.map(v => v.timestamp));
            const existingCloneDates = new Set(allData.clones.map(c => c.timestamp));

            for (const v of views.data.views) {
              if (!existingViewDates.has(v.timestamp)) {
                allData.views.push(v);
              }
            }

            for (const c of clones.data.clones) {
              if (!existingCloneDates.has(c.timestamp)) {
                allData.clones.push(c);
              }
            }

            // Sort by date
            allData.views.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            allData.clones.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            allData.lastUpdated = new Date().toISOString();

            // Calculate totals
            allData.totalViews = allData.views.reduce((sum, v) => sum + v.count, 0);
            allData.totalUniqueVisitors = allData.views.reduce((sum, v) => sum + v.uniques, 0);
            allData.totalClones = allData.clones.reduce((sum, v) => sum + v.count, 0);
            allData.totalUniqueCloners = allData.clones.reduce((sum, v) => sum + v.uniques, 0);

            // Save
            fs.writeFileSync(dataFile, JSON.stringify(allData, null, 2));

            console.log(`📊 Traffic summary:`);
            console.log(`   Total views: ${allData.totalViews} (${allData.totalUniqueVisitors} unique)`);
            console.log(`   Total clones: ${allData.totalClones} (${allData.totalUniqueCloners} unique)`);
            console.log(`   Data points: ${allData.views.length} days of views, ${allData.clones.length} days of clones`);

      - name: 💾 Commit traffic data
        run: |
          git config --global user.name "Traffic Bot"
          git config --global user.email "traffic-bot@users.noreply.github.com"
          git add traffic-data.json
          git diff --quiet --staged || git commit -m "📊 Update traffic data [skip ci]"
          git push
